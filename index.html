<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!--
      スマホでの2本指ピンチによる拡大・縮小を許可する。
      以前は maximum-scale=1.0, user-scalable=no が付いており、
      小さい端末で文字・入力欄を拡大できなかった。この2つを外すことで、
      拡大後に指で上下左右へ移動して確認でき、入力欄・ボタンも拡大状態で
      通常どおり操作できる（いずれもブラウザ標準の挙動）。
      viewport-fit=cover はノッチ対応のため残す。
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="総合ライフプラン" />
    <title>資産形成 総合ライフプラン</title>
    <meta name="description" content="NISA積立・老後資産・年金・健康費用・生命保険・相続を統合したライフプランシミュレーター。つみたて投資枠と成長投資枠の生涯投資枠を管理しながら、生涯の資産推移を試算できます。" />

    <!-- PWA: manifest / icons / theme color -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b1117" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- OGP (Facebook / LINE 等) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="資産形成 総合ライフプラン" />
    <meta property="og:description" content="NISA積立・老後資産・年金・健康費用・生命保険・相続を統合したライフプランシミュレーター" />
    <meta property="og:image" content="https://pitbully-works.vercel.app/ogp.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="https://pitbully-works.vercel.app/" />
    <meta property="og:locale" content="ja_JP" />

    <!-- Twitter (X) Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="資産形成 総合ライフプラン" />
    <meta name="twitter:description" content="NISA積立・老後資産・年金・健康費用・生命保険・相続を統合したライフプランシミュレーター" />
    <meta name="twitter:image" content="https://pitbully-works.vercel.app/ogp.png" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-R4RLTFHRD7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-R4RLTFHRD7');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
    <script>
      // PWAとして「ホーム画面に追加」できるようにするためのservice worker登録
      // 既存のReactアプリ・計算ロジックには一切関係しません
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
