name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: 回帰テスト
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存パッケージをインストール
        run: npm install

      - name: 回帰テストを実行
        run: npx vitest run --reporter=verbose
